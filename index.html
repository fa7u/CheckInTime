<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>checkInTime</title>
    
    <!-- PWA Manifest & Meta Tags -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var tenant = params.get('tenant') || 'default';
        var portal = params.get('portal') || 'admin';
        var company = params.get('company') || 'checkInTime';
        
        // Also fallback to localStorage if available
        if (tenant === 'default' && window.localStorage) {
          var storedTenant = window.localStorage.getItem('hader_active_tenant_id');
          if (storedTenant) {
            tenant = storedTenant;
          }
        }
        
        var manifestUrl = '/manifest.json?tenant=' + encodeURIComponent(tenant) + '&portal=' + encodeURIComponent(portal) + '&company=' + encodeURIComponent(company);
        var link = document.createElement('link');
        link.id = 'pwa-manifest';
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);
      })();
    </script>
    <meta name="theme-color" content="#D4AF37" />
    
    <!-- iOS / Apple Add to Home Screen Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta id="apple-title" name="apple-mobile-web-app-title" content="checkInTime" />
    <link rel="apple-touch-icon" href="/icon.png" />
    
    <!-- Standard Favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Service Worker registered successfully:', reg.scope);
              reg.update();
            })
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
